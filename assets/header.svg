<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" fill="none" role="img" aria-label="AI Engineer">
  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8f8f8f"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#8f8f8f"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-1 0; 1 0; 1 0" keyTimes="0;0.55;1" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
    <style>
      .title { font: 300 60px 'Segoe UI','Helvetica Neue',Arial,sans-serif; letter-spacing: 12px; }
      .sub   { font: 400 17px 'Consolas','SF Mono',monospace; fill:#8a8a8a; letter-spacing:2px; }
      .rise  { opacity:0; animation: rise 1s ease forwards; }
      .rise2 { opacity:0; animation: rise 1s ease forwards .35s; }
      .line  { stroke:#ffffff; stroke-width:1; stroke-dasharray:300; stroke-dashoffset:300;
               animation: draw 1.5s ease forwards .5s; opacity:.85; }
      .tick  { stroke:#ffffff; stroke-width:1; opacity:0; animation: fade 1s ease forwards 1s; }
      .caret { animation: blink 1.1s steps(1) infinite; }
      .role  { opacity:0; }
      .a { animation: roll 12s infinite; }
      .b { animation: roll 12s infinite 4s; }
      .c { animation: roll 12s infinite 8s; }
      @keyframes rise { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
      @keyframes draw { to{ stroke-dashoffset:0; } }
      @keyframes fade { to{ opacity:.45; } }
      @keyframes blink{ 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
      @keyframes roll { 0%{opacity:0;} 3%{opacity:1;} 28%{opacity:1;} 33%,100%{opacity:0;} }
    </style>
  </defs>

  <rect width="1200" height="300" rx="2" fill="#0a0a0a"/>
  <rect width="1200" height="300" rx="2" fill="url(#dots)"/>
  <rect x="0.5" y="0.5" width="1199" height="299" rx="2" fill="none" stroke="#1f1f1f"/>

  <g class="tick">
    <path d="M28 40 V28 H40"/><path d="M1160 40 V28 H1172"/>
    <path d="M28 260 V272 H40"/><path d="M1160 260 V272 H1172"/>
  </g>

  <g class="rise">
    <text class="title" x="72" y="148" fill="url(#shine)">AI ENGINEER</text>
  </g>

  <line class="line" x1="74" y1="178" x2="374" y2="178"/>

  <g class="rise2">
    <rect class="caret" x="74" y="206" width="9" height="18" fill="#8a8a8a"/>
    <g>
      <text class="sub role a" x="96" y="221">building intelligent systems</text>
      <text class="sub role b" x="96" y="221">python · fastapi · llms</text>
      <text class="sub role c" x="96" y="221">rag · langgraph · apis</text>
    </g>
  </g>
</svg>
