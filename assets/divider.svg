<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 24" width="1200" height="24" fill="none" role="img" aria-label="divider">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5"  stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <style>
      .ln { stroke: url(#fade); stroke-width: 1; stroke-dasharray: 1160; stroke-dashoffset: 1160;
            animation: draw 2.2s ease forwards; }
      .dot{ fill: #ffffff; animation: run 5s ease-in-out infinite; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      @keyframes run { 0%{ transform: translateX(120px); opacity:0; }
                       15%,85%{ opacity:1; } 100%{ transform: translateX(1080px); opacity:0; } }
    </style>
  </defs>
  <line class="ln" x1="20" y1="12" x2="1180" y2="12"/>
  <circle class="dot" cx="0" cy="12" r="2.5"/>
</svg>
